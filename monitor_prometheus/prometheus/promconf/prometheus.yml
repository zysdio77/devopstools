global:
  scrape_interval:     15s
  evaluation_interval: 15s
alerting:
  alertmanagers:
  - static_configs:
      - targets: ['alertmanager:9093']
      #- targets: ['172.22.169.233:9093']
    
rule_files:
  - "/rules/*rules.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: prometheus
 
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
  - job_name: node-exporter
    file_sd_configs:
      - files: ['/usr/local/prometheus/groups/nodegroups/*.yaml']
#配置文件的位置，支持json和yaml格式，这里直接用就可以了

  - job_name: 'blackbox-http-status'
    metrics_path: /probe
    params:
      module: [http_2xx] #blackbox的modules
    static_configs:
      - targets:
        - http://172.22.236.51/explore/ #nginx
        - http://172.22.236.52/explore/ #nginx
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115 #blackbox地址
